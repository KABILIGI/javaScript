<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Welcome Page</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 flex items-center justify-center min-h-screen">

    <div class="bg-white p-8 rounded-2xl shadow-2xl max-w-md w-full text-center">
        <h1 class="text-2xl font-bold text-slate-800 mb-4">Task 1: Console Output</h1>
        <p class="text-slate-600 mb-6">
            The student information has been processed. Please <strong>Right-Click</strong> on this page, select <strong>"Inspect"</strong>, and open the <strong>"Console"</strong> tab to see the message.
        </p>
        <div class="bg-slate-100 p-4 rounded-lg border border-slate-200">
            <code class="text-blue-600 font-mono text-sm">Check the browser console!</code>
        </div>
    </div>

    <script>
        // 1. Declaring variables
        const studentName = "Denys";
        const courseName = "Frontend Development";
        const year = 2026;

        // 2. Displaying the message in the browser console
        console.log(`Welcome ${studentName} to the ${courseName} course.`);
        
        // Bonus: Logging the year as well
        console.log(`Year: ${year}`);
    </script>
</body>
</html>
