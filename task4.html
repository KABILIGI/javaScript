<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Calculator Task</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center p-4">

    <div class="bg-white p-8 rounded-3xl shadow-xl max-w-md w-full border border-slate-200">
        <h2 class="text-2xl font-bold text-slate-800 mb-6 text-center">Simple Calculator</h2>
        
        <div class="space-y-4 mb-8">
            <div>
                <label class="block text-sm font-medium text-slate-600 mb-1">Number 1</label>
                <input type="number" id="num1" value="10" class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition">
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-600 mb-1">Number 2</label>
                <input type="number" id="num2" value="5" class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition">
            </div>
            <button id="calcBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl transition-all shadow-lg active:scale-95">
                Calculate Results
            </button>
        </div>

        <div class="bg-slate-50 p-6 rounded-2xl border border-slate-100 space-y-3 font-mono">
            <p class="flex justify-between text-slate-700"><span>Addition:</span> <span id="add-res" class="font-bold text-blue-600">--</span></p>
            <p class="flex justify-between text-slate-700"><span>Subtraction:</span> <span id="sub-res" class="font-bold text-blue-600">--</span></p>
            <p class="flex justify-between text-slate-700"><span>Multiplication:</span> <span id="mul-res" class="font-bold text-blue-600">--</span></p>
            <p class="flex justify-between text-slate-700"><span>Division:</span> <span id="div-res" class="font-bold text-blue-600">--</span></p>
        </div>
    </div>

    <script>
        const btn = document.getElementById('calcBtn');

        btn.addEventListener('click', function() {
            // 1. Get values and convert strings to numbers
            const n1 = parseFloat(document.getElementById('num1').value);
            const n2 = parseFloat(document.getElementById('num2').value);

            // 2. Perform Calculations
            const addition = n1 + n2;
            const subtraction = n1 - n2;
            const multiplication = n1 * n2;
            const division = n2 !== 0 ? (n1 / n2).toFixed(2) : "Error (Div by 0)";

            // 3. Display Results in the DOM
            document.getElementById('add-res').textContent = addition;
            document.getElementById('sub-res').textContent = subtraction;
            document.getElementById('mul-res').textContent = multiplication;
            document.getElementById('div-res').textContent = division;
        });
    </script>

</body>
</html>
