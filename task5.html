<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tailwind To-Do List</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-indigo-50 min-h-screen flex items-center justify-center p-4">

    <div class="bg-white w-full max-w-md rounded-3xl shadow-2xl p-8 border border-indigo-100">
        <h2 class="text-3xl font-extrabold text-slate-800 mb-6 text-center">My Tasks</h2>
        
        <div class="flex gap-2 mb-8">
            <input type="text" id="todo-input" placeholder="What needs to be done?" 
                class="flex-1 px-4 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none transition-all">
            <button id="add-btn" 
                class="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-3 rounded-xl font-bold transition-all active:scale-95">
                Add
            </button>
        </div>

        <ul id="todo-list" class="space-y-3">
            <li class="text-center text-slate-400 italic py-4">No tasks yet. Add one above!</li>
        </ul>
    </div>

    <script>
        const input = document.getElementById('todo-input');
        const addBtn = document.getElementById('add-btn');
        const todoList = document.getElementById('todo-list');

        function addTask() {
            const taskValue = input.value.trim();
            
            if (taskValue === "") {
                alert("Please enter a task!");
                return;
            }

            // Remove the "Empty" message if it exists
            if (todoList.children.length === 1 && todoList.querySelector('li').classList.contains('italic')) {
                todoList.innerHTML = '';
            }

            // 1. Create the list item (li)
            const li = document.createElement('li');
            li.className = "group flex items-center justify-between p-4 bg-slate-50 border border-slate-100 rounded-xl hover:shadow-md transition-all";
            
            // 2. Add Task Text and Buttons
            li.innerHTML = `
                <span class="flex-1 cursor-pointer text-slate-700 font-medium transition-all" onclick="toggleComplete(this)">
                    ${taskValue}
                </span>
                <button onclick="removeTask(this)" class="text-slate-300 hover:text-red-500 transition-colors ml-4">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="Hold 9 2a1 1 0 00-.894.553L7.382 4H4a1 1 0 000 2v10a2 2 0 002 2h8a2 2 0 002-2V6a1 1 0 100-2h-3.382l-.724-1.447A1 1 0 0011 2H9zM7 8a1 1 0 012 0v6a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v6a1 1 0 102 0V8a1 1 0 00-1-1z" clip-rule="evenodd" />
                    </svg>
                </button>
            `;

            todoList.appendChild(li);
            input.value = ""; // Clear input
        }

        // Logic for Removing Tasks
        function removeTask(button) {
            button.closest('li').remove();
            
            // Show empty message if list is empty
            if (todoList.children.length === 0) {
                todoList.innerHTML = '<li class="text-center text-slate-400 italic py-4">No tasks yet. Add one above!</li>';
            }
        }

        // Bonus Logic: Mark as Completed
        function toggleComplete(textElement) {
            textElement.classList.toggle('line-through');
            textElement.classList.toggle('text-slate-400');
            textElement.classList.toggle('opacity-50');
        }

        // Event Listeners
        addBtn.addEventListener('click', addTask);
        
        // Add task when pressing "Enter" key
        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') addTask();
        });
    </script>
</body>
</html>
